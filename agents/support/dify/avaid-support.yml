# Dify app export template — import via Studio or API
# Model: Mistral AI mistral-large-latest (API, работает с РФ-серверов без VPN)
# Mode: Agent Chat

app:
  name: Avaid Support
  mode: agent-chat
  description: Техподдержка Avaid — настройка, остатки, цены, заказы, МойСклад, тарифы (справочно)

model:
  provider: mistralai
  name: mistral-large-latest
  parameters:
    temperature: 0.1
    top_p: 0.9
    max_tokens: 1024

features:
  file_upload: false
  opening_statement: |
    Здравствуйте! Я помогу с приложением Avaid.
    Выберите тему или опишите проблему: остатки, цены, заказы, настройка магазина, ошибка синхронизации, тариф.
  suggested_questions:
    - Не обновляются остатки
    - Проблема с ценами или акциями
    - Заказ не подтверждается
    - Как подключить магазин
    - Ошибка / не работает синхронизация
    - Вопрос по тарифу

agent:
  strategy: function_call
  max_iteration: 5
  system_prompt_file: ../prompts/system.md

knowledge:
  datasets:
    # Основной датасет — сценарии dify-kb + правила rules/
    - name: Avaid Rules
      source: shared/knowledge/dify-kb/
    # Закомментированы — подключать только если нужен режим codebase/full
    # - name: Avaid Codebase
    #   source: shared/knowledge/codebase/
    # - name: Avaid DB Schema
    #   source: shared/docs/db-schema-for-agent.md
  retrieval:
    top_k: 8
    # score_threshold убран намеренно: 0.5 отсекает валидные chunks на qwen+nomic-embed-text
    # Дополнительная фильтрация идёт через промпт (system.md)
    score_threshold_enabled: false

tools:
  - type: openapi
    spec: openapi-db-api.yaml
    auth:
      type: api_key
      header: X-Support-Api-Key
      value: ${SUPPORT_API_KEY}
    custom_headers:
      X-Dify-User-Email: "{{user_email}}"

variables:
  - name: user_email
    type: string
    required: true

security:
  sensitive_words:
    - password
    - api_key
    - token
    - secret
    - BEGIN PRIVATE
    - SELECT *
    - DROP TABLE
    - ignore instructions

memory:
  window: 20
  conversation_variables:
    - shop_id
    - scenario_type
