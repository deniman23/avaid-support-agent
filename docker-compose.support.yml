services:
  support-db:
    image: postgres:16-alpine
    container_name: support-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-avaid_support}
    ports:
      - "5433:5432"
    volumes:
      - support_pgdata:/var/lib/postgresql/data
      - ./shared/db/00-stub-functions.sql:/docker-entrypoint-initdb.d/00-stub-functions.sql:ro
      - ./shared/db/apply-ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - ./shared/db/init-support-reader.sql:/docker-entrypoint-initdb.d/02-reader.sql:ro
      - ./shared/db/init-support-writer.sql:/docker-entrypoint-initdb.d/03-writer.sql:ro
      - ./shared/db/seed.sql:/docker-entrypoint-initdb.d/04-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d avaid_support"]
      interval: 5s
      timeout: 5s
      retries: 10

  support-db-api:
    build: ./shared/db-api
    container_name: support-db-api
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://support_writer:support_writer_pass@support-db:5432/avaid_support}
      DB_API_MODE: ${DB_API_MODE:-readwrite}
      SUPPORT_API_KEY: ${SUPPORT_API_KEY:-change-me-local-dev-key}
    ports:
      - "8090:8090"
    depends_on:
      support-db:
        condition: service_healthy
    volumes:
      - support_audit:/var/log/support-db-api
    networks:
      - default
      - dify

networks:
  dify:
    external: true
    name: ${DIFY_DOCKER_NETWORK:-docker_default}

volumes:
  support_pgdata:
  support_audit:
